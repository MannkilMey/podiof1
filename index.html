<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Compite con tus amigos prediciendo Formula 1. Crea tu grupo, invita amigos y gana puntos. 100% gratis." />
  <meta name="keywords" content="formula 1, predicciones, fantasy f1, sports, racing, friends, competition" />

  <link rel="alternate" hreflang="es" href="https://podiof1.com/" />
  <link rel="canonical" href="https://podiof1.com/" />
  
  <!-- Open Graph -->
  <meta property="og:type" content="website" />

  <!-- PWA -->
  <meta name="theme-color" content="#E8002D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="/manifest.json" />
  
   <!-- Lee el tema guardado ANTES de que cargue React, para que el primer pintado ya sea correcto -->
  <script>
    (function() {
      var theme = 'dark';
      try {
        var stored = localStorage.getItem('podiof1-theme');
        if (stored) {
          var parsed = JSON.parse(stored);
          theme = (parsed.state && parsed.state.theme) || parsed.theme || 'dark';
        }
      } catch (e) {}
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Fondo de seguridad — coincide con el data-theme real de <html>, no un color fijo -->
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; }
    html[data-theme="dark"], html[data-theme="dark"] body, html[data-theme="dark"] #root {
      background: #0A0A0C;
    }
    html[data-theme="light"], html[data-theme="light"] body, html[data-theme="light"] #root {
      background: #F5F6F8;
    }
  </style>

  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-72.png" />
  <link rel="shortcut icon" href="/icons/icon-96.png" />
</head>

</body>
